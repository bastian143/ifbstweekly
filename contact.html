 <!DOCTYPE html>
 <html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 </head>
 <body>
  <h1>WEB INFORMATIKA BST 2026</h1>

     <table border="1" cellspacing="0" cellpadding="10">

        <td><a href="index.html"> Home </a></td>

<section id="kontak">
  <h2>Hubungi Saya</h2>
  <p>jika memiliki pesan, bisa isi form dibawah ini:</p>

  <form action="#" method="post">
    <div>
      <label for="nama">Nama Lengkap:</label><br />
      <input
        type="text"
        id="nama"
        name="nama"
        placeholder="Masukkan nama Anda"
        required
      />
    </div>
    <br />

    <div>
      <label for="email">Alamat Email:</label><br />
      <input
        type="email"
        id="email"
        name="email"
        placeholder="contoh@email.com"
        required
      />
    </div>
    <br />

    <div>
      <label for="subjek">Subjek:</label><br />
      <select id="subjek" name="subjek">
        <option value="umum">Pertanyaan Umum</option>
        <option value="kerjasama">Tawaran Kerjasama</option>
        <option value="tugas">Diskusi Tugas</option>
      </select>
    </div>
    <br />

    <div>
      <label for="pesan">Isi Pesan:</label><br />
      <textarea
        id="pesan"
        name="pesan"
        rows="5"
        cols="30"
        placeholder="Tuliskan pesanmu di sini..."
      ></textarea>
    </div>
    <br />

    <div>
      <button type="submit">Kirim Pesan</button>
      <button type="reset">Hapus Input</button>
    </div>
  </form>
</section>
 </body>
 </html>
